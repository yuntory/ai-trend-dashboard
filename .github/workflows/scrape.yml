name: Scrape Character Rankings

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          SCRAPER_TARGET_URL: ${{ secrets.SCRAPER_TARGET_URL }}
          SCRAPER_SERVICE_NAME: ${{ vars.SCRAPER_SERVICE_NAME || 'Zeta' }}
          SCRAPER_CARD_SELECTOR: ${{ vars.SCRAPER_CARD_SELECTOR || '.ranking-card' }}
          SCRAPER_NAME_SELECTOR: ${{ vars.SCRAPER_NAME_SELECTOR || '.character-name' }}
          SCRAPER_IMAGE_SELECTOR: ${{ vars.SCRAPER_IMAGE_SELECTOR || 'img.character-image' }}
          SCRAPER_CHAT_COUNT_SELECTOR: ${{ vars.SCRAPER_CHAT_COUNT_SELECTOR || '.chat-count' }}
          SCRAPER_GENRE_TAG_SELECTOR: ${{ vars.SCRAPER_GENRE_TAG_SELECTOR || '.genre-tag' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE_NAME: characters_trend
        run: node scripts/scrape-zeta.mjs
