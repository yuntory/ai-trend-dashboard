name: Daily Scraper Update

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  update-crack:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Crack scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE_NAME: characters_trend
          CRACK_RANKING_URL: ${{ vars.CRACK_RANKING_URL || 'https://crack-api.wrtn.ai/crack-api/stories?sort=totalMessageCount.desc&isOriginal=true' }}
        run: node scripts/scrape-crack.mjs
